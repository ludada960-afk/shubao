<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width: 440px; font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
      background: #fff; color: #222; font-size: 13px; line-height: 1.5;
    }
    .header {
      display: flex; align-items: center; padding: 10px 14px;
      background: linear-gradient(135deg,#6366F1,#4F46E5); color: #fff;
    }
    .header h1 { font-size: 13px; font-weight: 600; }

    .body { padding: 10px 12px; padding-bottom: 56px; }

    .status-bar { padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; font-weight: 500; word-break: break-all; }
    .status-bar.ok { background: #ECFDF5; color: #065F46; }
    .status-bar.err { background: #FEF2F2; color: #991B1B; }

    .zone-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: #555;
      padding: 4px 0; margin-top: 6px;
    }
    .zone-label .count { font-size: 10px; color: #999; font-weight: 400; }

    .img-row { display: flex; gap: 3px; margin-bottom: 3px; }
    .img-cell {
      flex: 1; position: relative; border-radius: 4px; overflow: hidden;
      background: #f5f5f5; border: 1px solid #eee; cursor: pointer;
      min-width: 0; max-width: 25%;
    }
    .img-cell img { display: block; width: 100%; height: 60px; object-fit: cover; }
    .img-cell:hover { border-color: #6366F1; }
    .img-fname {
      font-size: 8px; color: #999; text-align: center; line-height: 1.2;
      padding: 1px 2px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; background: #fafafa;
    }
    .zone-more {
      font-size: 9px; color: #aaa; text-align: center; padding: 2px 0 0;
    }

    .actions {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 6px; padding: 8px 12px;
      background: #fff; border-top: 1px solid #f0f0f0;
    }
    .btn {
      flex: 1; padding: 9px 12px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; text-align: center;
    }
    .btn-primary { background: #6366F1; color: #fff; }
    .btn-primary:hover { background: #4F46E5; }
    .btn-primary:disabled { background: #C7D2FE; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #6366F1; border: 1px solid #C7D2FE; }
    .btn-outline:hover { background: #EEF2FF; }

    .empty { text-align: center; padding: 30px 14px; color: #999; }
    .empty .icon { font-size: 28px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="header"><h1>薯包AI 商品提取器</h1></div>
  <div id="app">
    <div class="empty"><div class="icon">📦</div><p>请在商品页面点击插件</p></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
