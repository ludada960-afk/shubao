<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>薯包AI · 提取</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f8f9fb;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      padding: 18px 20px 14px;
      color: #fff;
    }
    .header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .header p { font-size: 11px; opacity: .75; margin-top: 3px; }

    .body { padding: 16px 20px 20px; }

    .platform-info {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: #fff; border-radius: 10px;
      margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      font-size: 13px; border-left: 3px solid #22c55e;
    }
    .platform-info.unsupported { border-left-color: #ef4444; }
    .platform-info .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .platform-info.supported .dot { background: #22c55e; }
    .platform-info.unsupported .dot { background: #ef4444; }
    .platform-info .name { font-weight: 600; }
    .platform-info .hint { color: #64748b; font-size: 11px; margin-left: auto; }

    /* 注入进度 */
    .inject-status {
      text-align: center; padding: 30px 10px;
    }
    .inject-status .icon { font-size: 36px; margin-bottom: 10px; }
    .inject-status .title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .inject-status .desc { font-size: 12px; color: #64748b; line-height: 1.6; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid #e2e8f0; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .extract-btn {
      display: block; width: 100%;
      padding: 14px 0; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff;
      box-shadow: 0 3px 10px rgba(99,102,241,.3);
    }
    .extract-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(99,102,241,.4); }
    .extract-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .extract-btn .sub { display: block; font-size: 11px; font-weight: 400; opacity: .75; margin-top: 3px; }
    .extract-btn.extracting { background: linear-gradient(135deg, #94a3b8, #64748b); }
    .extract-btn.done { background: linear-gradient(135deg, #22c55e, #16a34a); }

    .status {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      font-size: 12px; line-height: 1.5; display: none;
    }
    .status.show { display: block; }
    .status.loading { background: #fef9c3; color: #854d0e; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status .em { font-weight: 600; }

    .stats {
      margin-top: 14px; padding: 12px 14px; background: #fff;
      border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      display: none; font-size: 12px; line-height: 1.6;
    }
    .stats.show { display: block; }
    .stats-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .stats-label { color: #64748b; }
    .stats-value { font-weight: 600; }

    .footer { padding: 10px 20px 14px; text-align: center; }
    .footer a { font-size: 11px; color: #94a3b8; text-decoration: none; }
    .footer a:hover { color: #6366f1; }

    .go-btn {
      display: none; width: 100%; margin-top: 10px;
      padding: 12px 0; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s;
      background: #fff; color: #7c3aed;
      border: 2px solid #e2e8f0;
    }
    .go-btn:hover { border-color: #7c3aed; background: #f5f3ff; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🛒 薯包AI · 商品图片提取</h1>
    <p>一键采集 → AI 逆向 → 替换商品 → 新图生成</p>
  </div>

  <div class="body">
    <div class="platform-info supported" id="platformInfo">
      <span class="dot"></span>
      <span class="name" id="platformName">检测中...</span>
      <span class="hint"></span>
    </div>

    <!-- 注入进度 / 结果 -->
    <div class="inject-status" id="injectSection">
      <div class="icon"><span class="spinner"></span></div>
      <div class="title">正在注入提取脚本...</div>
      <div class="desc">请稍候</div>
    </div>

    <!-- 提取面板 -->
    <div id="extractSection" style="display:none">
      <button class="extract-btn" id="extractBtn" disabled>
        ⏳ 初始化中...
      </button>

      <div class="stats" id="stats">
        <div class="stats-row"><span class="stats-label">📷 图片数量</span><span class="stats-value" id="statCount">0</span></div>
        <div class="stats-row"><span class="stats-label">🏷️ 商品标题</span><span class="stats-value" id="statTitle" style="font-weight:400;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</span></div>
      </div>

      <div class="status" id="status"></div>
      <button class="go-btn" id="goBtn">🚀 前往 AI 复刻页面</button>
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:5173" target="_blank">薯包AI · 让每张商品图都成为爆款</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
