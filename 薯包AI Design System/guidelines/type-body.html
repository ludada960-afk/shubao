<!-- @dsCard group="Type" viewport="700x300" name="Body Scale — Noto Sans SC" subtitle="Running text sizes for notes & UI" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-body)}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--ink-100)}
  .tag{flex:0 0 130px;font-size:10px;color:var(--text-faint);font-family:var(--font-num)}
  .ex{color:var(--text-body)}
</style></head>
<body>
  <div class="r"><span class="tag">--fs-lead · 18</span><span class="ex" style="font-size:18px;font-weight:500;color:var(--text-strong)">输入一句话主题，AI 帮你写爆款</span></div>
  <div class="r"><span class="tag">--fs-body · 15</span><span class="ex" style="font-size:15px">谁懂啊！不去大理人挤人了，这5个小县城真的绝了，物价感人100块吃一天不重样。</span></div>
  <div class="r"><span class="tag">--fs-sm · 13</span><span class="ex" style="font-size:13px;color:var(--text-muted)">点赞收藏不迷路 · 评论区问我</span></div>
  <div class="r"><span class="tag">--fs-xs · 11</span><span class="ex" style="font-size:11px;color:var(--text-muted)">薯包AI 出品 · 3852 赞</span></div>
  <div class="r" style="border:none"><span class="tag">--fs-micro · 10</span><span class="ex" style="font-size:10px;color:var(--text-faint)">登录后作品自动保存到个人作品集</span></div>
</body></html>
