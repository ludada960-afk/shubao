<!-- @dsCard group="Colors" viewport="700x200" name="Accent Colors" subtitle="Sprout green · sunshine yellow · blush · grape" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .col .t{font-size:11px;font-weight:700;color:var(--text-body);margin:0 0 6px}
  .bar{display:flex;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-xs)}
  .c{flex:1;height:56px}
  .h{font-size:9px;color:var(--text-faint);font-family:var(--font-num);margin-top:5px}
</style></head>
<body>
  <div class="grid">
    <div class="col"><p class="t">🌱 Sprout 成功</p><div class="bar"><div class="c" style="background:var(--sprout-100)"></div><div class="c" style="background:var(--sprout-300)"></div><div class="c" style="background:var(--sprout-500)"></div><div class="c" style="background:var(--sprout-700)"></div></div><div class="h">#5CC97A</div></div>
    <div class="col"><p class="t">✦ Sun 闪耀</p><div class="bar"><div class="c" style="background:var(--sun-100)"></div><div class="c" style="background:var(--sun-300)"></div><div class="c" style="background:var(--sun-500)"></div><div class="c" style="background:var(--sun-600)"></div></div><div class="h">#FFC329</div></div>
    <div class="col"><p class="t">🌸 Blush 腮红</p><div class="bar"><div class="c" style="background:var(--blush-200)"></div><div class="c" style="background:var(--blush-300)"></div><div class="c" style="background:var(--blush-400)"></div></div><div class="h">#FFB3C1</div></div>
    <div class="col"><p class="t">🍇 Grape 冷调</p><div class="bar"><div class="c" style="background:var(--grape-300)"></div><div class="c" style="background:var(--grape-500)"></div><div class="c" style="background:var(--grape-600)"></div></div><div class="h">#8B5CF6</div></div>
  </div>
</body></html>
