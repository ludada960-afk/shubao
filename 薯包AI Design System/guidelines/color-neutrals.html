<!-- @dsCard group="Colors" viewport="700x180" name="Warm Neutrals & Semantic" subtitle="Cream-tinted inks + status colors" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);margin:0 0 8px}
  .row{display:flex;gap:0;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-xs);margin-bottom:14px}
  .sw{flex:1;height:46px;display:flex;align-items:flex-end;padding:5px 7px;font-size:9px;font-family:var(--font-num)}
  .sem{display:flex;gap:10px}
  .pill{flex:1;border-radius:var(--r-sm);padding:9px 12px;font-size:12px;font-weight:700;text-align:center}
</style></head>
<body>
  <p class="lbl">Warm inks (cream-tinted)</p>
  <div class="row">
    <div class="sw" style="background:var(--ink-900);color:#fff">900</div>
    <div class="sw" style="background:var(--ink-700);color:#fff">700</div>
    <div class="sw" style="background:var(--ink-500);color:#fff">500</div>
    <div class="sw" style="background:var(--ink-300)">300</div>
    <div class="sw" style="background:var(--ink-200)">200</div>
    <div class="sw" style="background:var(--ink-100)">100</div>
    <div class="sw" style="background:var(--cream);box-shadow:inset 0 0 0 1px var(--ink-200)">cream</div>
  </div>
  <p class="lbl">Semantic</p>
  <div class="sem">
    <div class="pill" style="background:var(--success-soft);color:var(--success)">成功 success</div>
    <div class="pill" style="background:var(--warning-soft);color:var(--warning)">提醒 warning</div>
    <div class="pill" style="background:var(--danger-soft);color:var(--danger)">错误 danger</div>
    <div class="pill" style="background:var(--coral-50);color:var(--like)">♥ 喜欢 like</div>
  </div>
</body></html>
