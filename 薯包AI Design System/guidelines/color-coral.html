<!-- @dsCard group="Colors" viewport="700x190" name="Brand Coral" subtitle="The signature 薯包 red — primary across the system" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .n{font-size:10px;font-weight:700;font-family:var(--font-num)}
  .h{font-size:9px;opacity:.85;font-family:var(--font-num)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--coral-50)"><span class="n">50</span><span class="h">#FFF1F2</span></div>
    <div class="sw" style="background:var(--coral-100)"><span class="n">100</span><span class="h">#FFE0E4</span></div>
    <div class="sw" style="background:var(--coral-200)"><span class="n">200</span><span class="h">#FFC2CB</span></div>
    <div class="sw" style="background:var(--coral-300)"><span class="n">300</span><span class="h">#FF9FAD</span></div>
    <div class="sw" style="background:var(--coral-400);color:#fff"><span class="n">400</span><span class="h">#FF7587</span></div>
    <div class="sw" style="background:var(--coral-500);color:#fff"><span class="n">500 ·核心</span><span class="h">#FF4757</span></div>
    <div class="sw" style="background:var(--coral-600);color:#fff"><span class="n">600</span><span class="h">#ED2E45</span></div>
    <div class="sw" style="background:var(--coral-700);color:#fff"><span class="n">700</span><span class="h">#C81E37</span></div>
    <div class="sw" style="background:var(--coral-900);color:#fff"><span class="n">900</span><span class="h">#7A152A</span></div>
  </div>
</body></html>
