<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-num)}
  .row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--grad-coral);border-radius:4px;width:22px;box-shadow:var(--sh-xs)}
  .n{font-size:9px;color:var(--text-faint)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
    <div class="item"><div class="bar" style="height:20px"></div><span class="n">5·20</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="n">7·32</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="n">8·40</span></div>
    <div class="item"><div class="bar" style="height:56px"></div><span class="n">9·56</span></div>
    <div class="item"><div class="bar" style="height:72px"></div><span class="n">10·72</span></div>
  </div>
</body></html>
