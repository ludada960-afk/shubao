<!-- @dsCard group="Spacing" viewport="700x190" name="Radii" subtitle="Chunky jelly corners — very rounded by default" -->
<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-num)}
  .row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
  .item{text-align:center}
  .box{width:74px;height:74px;background:var(--grad-blush);box-shadow:var(--sh-sm)}
  .n{font-size:10px;color:var(--text-muted);margin-top:7px}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><div class="n">xs·8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><div class="n">sm·12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="n">md·18</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="n">lg·24</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="n">xl·32</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-pill)"></div><div class="n">pill</div></div>
    <div class="item"><div class="box" style="border-radius:var(--r-blob)"></div><div class="n">blob</div></div>
  </div>
</body></html>
